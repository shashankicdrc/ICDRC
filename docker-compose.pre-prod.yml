name: icdrc-pre-prod

# Intended to run from /var/www/icdrc-pre-prod on 77.37.45.141.
#
# Note: this is still the hot-reload/developer-oriented stack. The environment
# name is "pre-prod", but the app processes still run in the lightweight local
# development mode defined by the Dockerfile.dev files.
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXTAUTH_URL: http://77.37.45.141:3000
      NEXT_PUBLIC_BACKEND_URL: http://77.37.45.141:7000
      INTERNAL_BACKEND_URL: http://server:7000
      NEXT_PUBLIC_LEGACY_BACKEND_URL: http://77.37.45.141:5000
      INTERNAL_LEGACY_BACKEND_URL: http://backend:5000
      NEXT_PUBLIC_FRONTEND_URL: http://77.37.45.141:3000
    depends_on:
      - server
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    env_file:
      - ./dashboard/.env
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXTAUTH_URL: http://77.37.45.141:3001
      NEXT_PUBLIC_BACKEND_URL: http://77.37.45.141:7000
      INTERNAL_BACKEND_URL: http://server:7000
    depends_on:
      - server
    ports:
      - "3001:3001"
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
      - dashboard_next:/app/.next

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 7000
      FRONTEND_URL: http://77.37.45.141:3000
      BACKEND_URL: http://77.37.45.141:7000
      MONGO_URL: mongodb://mongo:27017/icdrc_server_pre_prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "7000:7000"
      - "8080:7000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      CLIENT_URL: http://77.37.45.141:3000
      FRONTEND_URL: http://77.37.45.141:3000
      MONGO_URL: mongodb://mongo:27017/icdrc_legacy_pre_prod
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  mongo:
    image: mongo:7
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  frontend_node_modules:
  frontend_next:
  dashboard_node_modules:
  dashboard_next:
  server_node_modules:
  backend_node_modules:
  mongo_data:
  redis_data:
