version: '3'
services:
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
     - "3003:3000"
    depends_on:
     - backend 

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4007:5000"
    environment:
      - MONGO_URL=${MONGO_URL}
      - JWT_SECRET=${JWT_SECRET}
    

  

