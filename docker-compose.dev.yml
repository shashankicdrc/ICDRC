# Developer laptop stack.
# Uses local Docker MongoDB and Redis with localhost-facing URLs.
# No legacy backend container is started; leftover legacy frontend URLs are
# pointed at the main server until those pages are migrated.
name: icdrc-dev

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ./frontend/.env
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BACKEND_URL: http://localhost:7000
      INTERNAL_BACKEND_URL: http://server:7000
      NEXT_PUBLIC_LEGACY_BACKEND_URL: http://localhost:7000
      INTERNAL_LEGACY_BACKEND_URL: http://server:7000
      NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
    depends_on:
      - server
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    env_file:
      - ./dashboard/.env
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXTAUTH_URL: http://localhost:3001
      NEXT_PUBLIC_BACKEND_URL: http://localhost:7000
      INTERNAL_BACKEND_URL: http://server:7000
    depends_on:
      - server
    ports:
      - "3001:3001"
    volumes:
      - ./dashboard:/app
      - dashboard_node_modules:/app/node_modules
      - dashboard_next:/app/.next

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 8080
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8080
      MONGO_URL: mongodb://mongo:27017/icdrc_server_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "7000:7000"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules

  mongo:
    image: mongo:7
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  frontend_node_modules:
  frontend_next:
  dashboard_node_modules:
  dashboard_next:
  server_node_modules:
  mongo_data:
  redis_data:
