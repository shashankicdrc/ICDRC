name: CI — Build & Verify

on:
  push:
    branches: ['*']
  pull_request:
    branches: [dev, main]

jobs:
  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Build check (syntax validation)
        working-directory: ./server
        run: node --check src/index.js

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Next.js
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: https://dev-api.icdrc.in
          NEXT_PUBLIC_MERCHANT_ID: placeholder
          NEXT_PUBLIC_SALT_KEY: placeholder
          NEXT_PUBLIC_SALT_INDEX: 1
          NEXTAUTH_SECRET: placeholder
          NEXTAUTH_URL: https://dev.icdrc.in
        run: npm run build

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: ./dashboard
        run: npm ci

      - name: Build Next.js
        working-directory: ./dashboard
        env:
          NEXTAUTH_SECRET: placeholder
          NEXTAUTH_URL: https://admin.icdrc.in
          NEXT_PUBLIC_BACKEND_URL: https://dev-api.icdrc.in
          INTERNAL_BACKEND_URL: http://server:7000
        run: npm run build
