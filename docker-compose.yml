version: '3.9'
services:
  client:
    container_name: nextapp
    image: nextapp
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
        - ./frontend/.env

  backend:
    container_name: server_icdrc
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
        - ./backend/.env
    volumes:
      - ./backend/:/app

