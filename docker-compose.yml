version: '3'
services:
  frontend:
    image: techwebdesys/icdrc-client:prev
    ports:
      - "3001:3000"
    depends_on:
      - backend

  backend:
    image: techwebdesys/icdrc-server:prev
    ports:
      - "5001:5000"
    environment:
      - MONGO_URL=${MONGO_URL}
      - JWT_SECRET=${JWT_SECRET}
