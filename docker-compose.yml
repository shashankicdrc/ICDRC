version: '3.9'
services:
  client:
    container_name: nextapp
    image: nextapp
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
        - ./frontend/.env
  
  server:
    container_name: new_server
    build: ./server
    restart: always
    env_file:
      - ./server/.env
    ports:
      - 7000:7000
    
  backend:
    container_name: server_icdrc
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
        - ./backend/.env
    volumes:
      - ./backend/:/app

  redis:
    container_name: redis
    image: redis:alpine
    restart: always
    ports:
      - 6379:6379

