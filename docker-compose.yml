version: '3.9'
services:
  client:
    container_name: icdrc_frontend
    image: app1
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - server
    env_file:
        - ./frontend/.env

  dashboard:
    container_name: icdrc_dashboard
    image: app2
    build: ./dashboard
    ports:
      - "3001:3001"
    depends_on:
      - server
    env_file:
        - ./dashboard/.env

  
  server:
    container_name: new_server
    build: ./server
    restart: always
    depends_on:
     - redis
    env_file:
      - ./server/.env
    ports:
      - 7000:7000
    
  redis:
    container_name: redis
    image: redis:alpine
    restart: always
    ports:
      - 6379:6379

