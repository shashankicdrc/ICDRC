version: '3'
services:
  frontend:
    image: techwebdesys/icdrc-client:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    image: techwebdesys/icdrc-server:latest
    ports:
      - "5000:5000"
    environment:
      - MONGO_URL=${MONGO_URL}
      - JWT_SECRET=${JWT_SECRET}
